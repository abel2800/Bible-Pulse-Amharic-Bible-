name: bible_pulse
description: A comprehensive cross-platform devotional Bible app with amazing UI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # UI Components
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  timezone: ^0.9.2
  
  # Image Processing
  screenshot: ^3.0.0
  image_gallery_saver: ^2.0.3
  permission_handler: ^11.1.0
  
  # Utilities
  intl: ^0.20.2
  uuid: ^4.2.2
  
  # HTTP for Bible API (optional)
  http: ^1.1.0
  
  # Sharing
  share_plus: ^7.2.1
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/wallpapers/
    - assets/bible/
    - assets/icons/
  
dependency_overrides:
  flutter_local_notifications:
    path: packages/flutter_local_notifications