name: BiblePulse CI

on:
  push:
  pull_request:

env:
  FLUTTER_VERSION: 3.44.1

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test integration_test
      - name: Analyze app-owned code
        run: flutter analyze lib test integration_test
      - name: Validate licensed content
        run: python tools/content/validate_manifest.py
      - name: Run unit, widget, accessibility, migration, and golden tests
        run: flutter test
      - name: Build web release
        run: flutter build web --release --no-wasm-dry-run

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Build unsigned Android verification artifacts
        run: |
          flutter build apk --release
          flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-unsigned-verification
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: linux-verification
          path: build/linux/x64/release/bundle

  apple:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - run: flutter build macos --release

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-unsigned-verification
          path: build/windows/x64/runner/Release

  firebase-emulators:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: npm ci
        working-directory: firebase-tests
      - name: Test Firestore authorization rules
        run: npx firebase-tools@latest emulators:exec --only firestore "npm --prefix firebase-tests test"

  web-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - uses: nanasess/setup-chromedriver@v2
      - run: flutter pub get
      - name: Run browser integration smoke test
        run: |
          chromedriver --port=4444 &
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/app_smoke_test.dart \
            -d chrome
